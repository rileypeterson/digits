name: generate_digits

# Controls when the workflow will run
on:
  # Run at midnight UTC
  schedule:
    - cron: '0 0 * * *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-digits-${{ github.ref }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  gen_digits:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6.0.1
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14'
          check-latest: true

      - name: Generate Digits
        uses: nick-fields/retry@v4.0.0
        with:
          timeout_seconds: 180
          max_attempts: 5
          command: |
            export PYTHONPATH=$PYTHONPATH:`pwd`
            python gen_digits.py

      # Add new files in data folder, commit along with other modified files, push
      - name: Commit files
        run: |
          set -euo pipefail
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet || git commit -m "GH ACTION $GITHUB_WORKFLOW $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin $GITHUB_REF_NAME
